services:
  tcp-echo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.services
    working_dir: /workspace
    command: ["python", "/workspace/tests/integration/servers/tcp_echo_server.py", "--host", "0.0.0.0", "--port", "9000"]
    restart: unless-stopped

  udp-echo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.services
    working_dir: /workspace
    command: ["python", "/workspace/docker/servers/udp_echo_server.py", "--host", "0.0.0.0", "--port", "9001"]
    restart: unless-stopped

  http-echo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.services
    working_dir: /workspace
    command: ["python", "/workspace/tests/integration/servers/http_server.py"]
    restart: unless-stopped

  runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runner
    working_dir: /workspace
    depends_on:
      - tcp-echo
      - udp-echo
      - http-echo
    command: ["bash", "/workspace/docker/scripts/run_in_docker.sh"]
