services:
  faultcore-builder:
    build:
      context: .
      dockerfile: Dockerfile.builder
    image: faultcore/builder:latest

  echo-server:
    image: python:3.11-slim
    container_name: faultcore-echo-server
    command: ["python3", "/workspace/integration_tests/servers/tcp_echo_server.py", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    networks:
      - faultcore-net
    working_dir: /workspace
    volumes:
      - ./integration_tests/servers:/workspace/integration_tests/servers
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 9000)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 3

  http-server:
    image: python:3.11-slim
    container_name: faultcore-http-server
    command: ["sh", "-c", "pip install --no-cache-dir fastapi uvicorn && python3 /workspace/integration_tests/servers/http_server.py"]
    ports:
      - "8000:8000"
    networks:
      - faultcore-net
    working_dir: /workspace
    volumes:
      - ./integration_tests/servers:/workspace/integration_tests/servers
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      echo-server:
        condition: service_healthy

  test-runner:
    build:
      context: .
      dockerfile: integration_tests/Dockerfile.test
    image: faultcore/test-runner:latest
    container_name: faultcore-test-runner
    command: ["sh", "-c", "tail -f /dev/null"]
    networks:
      - faultcore-net
    depends_on:
      echo-server:
        condition: service_healthy
      http-server:
        condition: service_healthy

networks:
  faultcore-net:
    driver: bridge
