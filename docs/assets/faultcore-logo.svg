<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">faultcore logo simple devtools style</title>
  <desc id="desc">Simple recognizable symbol: packet flow enters a core module and exits transformed, plus faultcore wordmark.</desc>

  <defs>
    <style>
      .brand { font: 700 62px Inter, Segoe UI, Roboto, Arial, sans-serif; fill: #0f172a; letter-spacing: 0.2px; }
      .tag { font: 500 18px Inter, Segoe UI, Roboto, Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="260" rx="22" fill="#f8fafc"/>

  <g transform="translate(36,38)">
    <rect x="106" y="42" width="116" height="116" rx="20" fill="#0ea5e9"/>
    <rect x="130" y="66" width="68" height="68" rx="12" fill="#ffffff"/>
    <circle cx="164" cy="100" r="11" fill="#0ea5e9"/>

    <line x1="18" y1="84" x2="106" y2="84" stroke="#0ea5e9" stroke-width="8" stroke-linecap="round"/>
    <line x1="18" y1="118" x2="106" y2="118" stroke="#0ea5e9" stroke-width="8" stroke-linecap="round"/>
    <rect x="40" y="76" width="12" height="12" rx="3" fill="#0ea5e9"/>
    <rect x="66" y="110" width="12" height="12" rx="3" fill="#0ea5e9"/>

    <line x1="222" y1="84" x2="314" y2="84" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
    <line x1="222" y1="118" x2="314" y2="118" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
    <circle cx="250" cy="84" r="7" fill="#10b981"/>
    <circle cx="282" cy="118" r="7" fill="#10b981"/>
  </g>

  <g transform="translate(390,78)">
    <text x="0" y="68" class="brand">faultcore</text>
    <text x="2" y="108" class="tag">non-intrusive network fault testing</text>
  </g>
</svg>
