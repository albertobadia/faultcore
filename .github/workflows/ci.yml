name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            faultcore_network -> target
            faultcore_interceptor -> target

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint
        run: bash lint.sh

      - name: Build
        run: bash build.sh

      - name: Tests
        run: bash tests.sh
